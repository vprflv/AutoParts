<svg
        width="100%"
        height="100%"
        viewBox="0 0 400 400"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        className="bg-zinc-900"
>
    <rect width="400" height="400" fill="#18181b" />

    {/* Неоновое свечение крестика (несколько слоёв) */}
    <g filter="url(#glow)">
        <line
                x1="100" y1="100" x2="300" y2="300"
                stroke="#22d3ee" strokeWidth="52" strokeLinecap="round"
                opacity="0.25"
        />
        <line
                x1="300" y1="100" x2="100" y2="300"
                stroke="#22d3ee" strokeWidth="52" strokeLinecap="round"
                opacity="0.25"
        />
    </g>

    {/* Основной крестик */}
    <g>
        <line
                x1="100" y1="100" x2="300" y2="300"
                stroke="#22d3ee" strokeWidth="50" strokeLinecap="round"
        />
        <line
                x1="300" y1="100" x2="100" y2="300"
                stroke="#22d3ee" strokeWidth="42" strokeLinecap="round"
        />
    </g>

    {/* Надпись */}
    <text
            x="200"
            y="335"
            textAnchor="middle"
            fill="#22d3ee"
            fontSize="29"
            fontWeight="700"
            letterSpacing="3"
    >
        NO IMAGE
    </text>

    <text
            x="200"
            y="365"
            textAnchor="middle"
            fill="#64748b"
            fontSize="14"
    >
        Изображение отсутствует
    </text>

    {/* Фильтр для свечения */}
    <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
</svg>